name: release

on:
  push:
    branches:
      - main
    paths:
      - pubspec.yaml

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lire version pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version détectée : $VERSION"

      - name: Tag existe déjà ?
        id: check
        run: |
          if git rev-parse --verify --quiet "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} existe déjà — skip."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Créer et pousser le tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
