name: cerbere
description: Gestion des rôles et autorisations Flutter avec Firebase Auth et Firestore. Vérification de permissions, widgets conditionnels et modèles (Cerbère).
version: 0.1.4+5

repository: https://github.com/nathanchateau/cerbere
documentation: https://github.com/nathanchateau/cerbere#readme
issue_tracker: https://github.com/nathanchateau/cerbere/issues

# Image affichée sur le côté de la page Pub.dev (miniature + section Screenshots)
screenshots:
  - description: Logo Cerbère — gardien des rôles et autorisations Flutter avec Firebase.
    path: assets/images/cerbere.png

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.0.0
